<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الامتحان الإلكتروني - مع مؤقت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); min-height: 100vh; }
        .btn-submit { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .loading { display: flex; justify-content: center; align-items: center; min-height: 400px; }
        .timer-danger { color: #dc2626; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-md text-center no-print">
            <div class="bg-emerald-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-3">
                <i class="fas fa-graduation-cap text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">الامتحان <span class="text-emerald-600">الإلكتروني</span></h1>
            <p class="text-slate-500 text-sm mt-1">الأسئلة محدثة تلقائياً من لوحة التحكم</p>
        </div>

        <!-- عداد الوقت -->
        <div class="bg-white rounded-xl p-3 mb-4 shadow-sm flex justify-between items-center no-print border-r-4 border-amber-500">
            <div class="flex items-center gap-2">
                <i class="fas fa-hourglass-half text-amber-600"></i>
                <span class="font-bold text-slate-700">الوقت المتبقي:</span>
            </div>
            <div id="timerDisplay" class="text-2xl font-mono font-bold text-amber-700">--:--</div>
        </div>

        <div id="loadingIndicator" class="loading">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto"></div>
                <p class="mt-3 text-slate-500">جاري تحميل الأسئلة...</p>
            </div>
        </div>

        <div id="quizContainer" class="space-y-5 hidden"></div>
        <div id="submitArea" class="mt-8 text-center hidden no-print">
            <button id="submitQuizBtn" class="btn-submit text-white font-bold py-3 px-8 rounded-xl shadow-lg text-lg transition hover:scale-105">
                <i class="fas fa-check-circle ml-2"></i> إنهاء الامتحان
            </button>
        </div>
        <div id="resultCard" class="mt-8 bg-white rounded-2xl shadow-xl hidden"></div>
    </div>

    <script>
        let quizQuestions = [];
        let userAnswers = [];
        let quizSubmitted = false;
        let timerInterval = null;
        let timeLeftSeconds = 0;
        
        // 👇 ضع معرف Gist الخاص بك هنا
        const GIST_ID = '7f7b08150e34fc0c8a5b00063944942a';
        
        async function loadQuestions() {
            const loadingDiv = document.getElementById('loadingIndicator');
            const container = document.getElementById('quizContainer');
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data.files || !data.files['questions.json']) throw new Error('questions.json غير موجود');
                const content = data.files['questions.json'].content;
                const parsed = JSON.parse(content);
                quizQuestions = parsed.questions || [];
                const durationMinutes = parsed.duration || 30;
                if (quizQuestions.length === 0) throw new Error('لا توجد أسئلة');
                
                // تهيئة الإجابات
                userAnswers = new Array(quizQuestions.length).fill(null);
                
                // بدء المؤقت
                timeLeftSeconds = durationMinutes * 60;
                startTimer();
                
                renderQuiz();
                loadingDiv.classList.add('hidden');
                container.classList.remove('hidden');
                document.getElementById('submitArea').classList.remove('hidden');
            } catch(error) {
                loadingDiv.innerHTML = `
                    <div class="bg-red-50 rounded-xl p-8 text-center max-w-md mx-auto border border-red-200">
                        <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-3"></i>
                        <p class="text-slate-800 font-bold mb-2">خطأ في تحميل الأسئلة</p>
                        <p class="text-slate-600 text-sm mb-4">${error.message}</p>
                        <button onclick="location.reload()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg">🔄 إعادة المحاولة</button>
                    </div>
                `;
            }
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (quizSubmitted) return;
                if (timeLeftSeconds <= 1) {
                    clearInterval(timerInterval);
                    if (!quizSubmitted) forceFinishExam();
                } else {
                    timeLeftSeconds--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(timeLeftSeconds / 60);
            const secs = timeLeftSeconds % 60;
            const timerEl = document.getElementById('timerDisplay');
            timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeftSeconds <= 60) {
                timerEl.classList.add('timer-danger');
            } else {
                timerEl.classList.remove('timer-danger');
            }
        }
        
        function forceFinishExam() {
            if (quizSubmitted) return;
            // تعبئة الإجابات غير المجاب عنها بـ -1 لتعتبر خاطئة
            for (let i = 0; i < userAnswers.length; i++) {
                if (userAnswers[i] === null) userAnswers[i] = -1;
            }
            submitQuiz(true);
        }
        
        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            let html = `<div class="mb-4 text-sm bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full inline-block">📋 عدد الأسئلة: ${quizQuestions.length}</div>`;
            quizQuestions.forEach((q, idx) => {
                let choicesHtml = '';
                q.choices.forEach((choice, chIdx) => {
                    const isChecked = (userAnswers[idx] === chIdx) ? 'checked' : '';
                    let bgClass = '';
                    let badge = '';
                    if (quizSubmitted) {
                        if (chIdx === q.correctChoiceIndex) {
                            bgClass = 'bg-green-50 border-green-300';
                            badge = '<span class="mr-2 text-green-600 text-xs">✓ الإجابة الصحيحة</span>';
                        } else if (userAnswers[idx] === chIdx) {
                            bgClass = 'bg-red-50 border-red-300';
                            badge = '<span class="mr-2 text-red-500 text-xs">✗ إجابتك</span>';
                        }
                    }
                    choicesHtml += `
                        <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition ${bgClass}">
                            <input type="radio" name="q${idx}" value="${chIdx}" ${isChecked} data-qidx="${idx}" data-choice="${chIdx}" class="quiz-radio w-5 h-5 text-emerald-600" ${quizSubmitted ? 'disabled' : ''}>
                            <div class="flex-1"><span class="font-medium">${escapeHtml(choice)}</span>${badge}</div>
                        </label>
                    `;
                });
                html += `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-5 bg-gradient-to-r from-slate-50 to-white">
                            <h3 class="font-bold text-slate-800 text-lg">${idx+1}. ${escapeHtml(q.text)}</h3>
                        </div>
                        <div class="p-4 space-y-2">${choicesHtml}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            if (!quizSubmitted) attachEvents();
        }
        
        function attachEvents() {
            document.querySelectorAll('.quiz-radio').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (quizSubmitted) return;
                    const qIdx = parseInt(e.target.dataset.qidx);
                    userAnswers[qIdx] = parseInt(e.target.value);
                });
            });
        }
        
        function submitQuiz(forced = false) {
            if (quizSubmitted) return;
            if (!forced) {
                const unanswered = userAnswers.some(ans => ans === null);
                if (unanswered) {
                    alert("⚠️ الرجاء الإجابة على جميع الأسئلة قبل إنهاء الامتحان.");
                    return;
                }
            }
            quizSubmitted = true;
            if (timerInterval) clearInterval(timerInterval);
            
            let score = 0;
            quizQuestions.forEach((q, idx) => {
                if (userAnswers[idx] === q.correctChoiceIndex) score++;
            });
            const total = quizQuestions.length;
            const percentage = Math.round((score / total) * 100);
            
            const resultDiv = document.getElementById('resultCard');
            let gradeClass = percentage >= 70 ? 'text-emerald-600' : (percentage >= 50 ? 'text-amber-600' : 'text-rose-600');
            let icon = percentage >= 70 ? 'fa-crown' : (percentage >= 50 ? 'fa-face-smile' : 'fa-book');
            let feedback = percentage >= 70 ? 'ممتاز! 🎉' : (percentage >= 50 ? 'جيد جداً 📚' : 'بحاجة للمذاكرة 💪');
            
            resultDiv.innerHTML = `
                <div class="p-6 text-center">
                    <i class="fas ${icon} text-5xl ${gradeClass} mb-3"></i>
                    <h2 class="text-2xl font-bold">نتيجتك: ${score} / ${total}</h2>
                    <div class="text-4xl font-extrabold ${gradeClass} mt-2">${percentage}%</div>
                    <p class="text-slate-500 mt-2">${feedback}</p>
                    <button onclick="location.reload()" class="mt-4 bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition">
                        🔄 إعادة الامتحان
                    </button>
                </div>
            `;
            resultDiv.classList.remove('hidden');
            document.getElementById('submitArea').classList.add('hidden');
            renderQuiz(); // إعادة عرض الأسئلة مع تصحيح
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }
        
        document.getElementById('submitQuizBtn')?.addEventListener('click', () => submitQuiz(false));
        loadQuestions();
    </script>
</body>
</html>
