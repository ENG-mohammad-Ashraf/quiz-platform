<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الامتحان الإلكتروني - تنظيم الأسرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .question-slide { transition: transform 0.2s ease, opacity 0.3s ease-in-out; }
        .shake { transform: translateX(-5px); }
        .toast-save {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 1000;
            animation: fadeOut 2s forwards;
            pointer-events: none;
        }
        .toast-warning {
            background: #dc2626 !important;
            font-weight: bold;
        }
        @keyframes fadeOut { 0% { opacity: 0.9; } 70% { opacity: 0.9; } 100% { opacity: 0; visibility: hidden; } }
        .timer-danger { color: #dc2626; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        .progress-bar { transition: width 0.3s ease; }
        .nav-btn { transition: all 0.2s; }
        .nav-btn:active { transform: scale(0.96); }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 90%;
            width: 600px;
            max-height: 80%;
            overflow-y: auto;
            direction: rtl;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        /* اسم المطور */
#creator-name {
    position: relative;
    display: inline-block;
    color: #22c55e;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.35s ease;
    cursor: pointer;
}

/* glow + حركة */
#creator-name:hover {
    color: #4ade80;
    text-shadow:
        0 0 5px rgba(34, 197, 94, 0.7),
        0 0 10px rgba(34, 197, 94, 0.5),
        0 0 20px rgba(34, 197, 94, 0.3);
}

/* الخط المتحرك */
#creator-name::after {
    content: "";
    position: absolute;
    right: 0;
    bottom: -4px;
    width: 0%;
    height: 2px;
    background: #22c55e;
    transition: width 0.35s ease;
    border-radius: 10px;
}

#creator-name:hover::after {
    width: 100%;
    left: 0;
}

/* Tooltip */
#creator-name::before {
    content: "View Portfolio →";
    position: absolute;
    top: -38px;
    right: 50%;
    transform: translateX(50%) translateY(10px);
    
    background: rgba(15, 23, 42, 0.95);
    color: white;
    
    padding: 6px 12px;
    border-radius: 10px;
    
    font-size: 12px;
    white-space: nowrap;

    opacity: 0;
    visibility: hidden;

    transition: all 0.45s ease;

    border: 1px solid rgba(34, 197, 94, 0.3);

    box-shadow:
        0 0 10px rgba(34, 197, 94, 0.15);

    backdrop-filter: blur(10px);
}

/* ظهور الـ tooltip */
#creator-name:hover::before {
    opacity: 1;
    visibility: visible;
    transform: translateX(50%) translateY(0);
}
/* تأثير الضغط */
.creator-name.clicked {
    animation: portalEffect 0.8s ease forwards;
}

@keyframes portalEffect {

    0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0);
    }

    25% {
        transform: scale(1.08);
        text-shadow:
            0 0 10px rgba(34, 197, 94, 0.9),
            0 0 20px rgba(34, 197, 94, 0.7),
            0 0 40px rgba(34, 197, 94, 0.5);
    }

    60% {
        transform: scale(0.95);
        opacity: 0.7;
        filter: blur(2px);
    }

    100% {
        transform: scale(1.4);
        opacity: 0;
        filter: blur(12px);
    }
}

        /* ========== الوضع الليلي ========== */
        body.dark-mode {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark-mode .bg-white,
        body.dark-mode .bg-slate-50,
        body.dark-mode .bg-gradient-to-r,
        body.dark-mode .bg-gray-50,
        body.dark-mode .bg-gray-100,
        body.dark-mode .bg-slate-100,
        body.dark-mode .bg-white\/80,
        body.dark-mode .rounded-xl.bg-white,
        body.dark-mode .rounded-2xl.bg-white,
        body.dark-mode .bg-white\/80.backdrop-blur {
            background-color: #1e293b !important;
            color: #f1f5f9 !important;

        body.dark-mode .question-slide,

        }
        body.dark-mode .bg-gradient-to-r.from-slate-50.to-white {

        }
        body.dark-mode .text-slate-800,
        body.dark-mode .text-slate-700,
        body.dark-mode .text-slate-600,
        body.dark-mode .text-gray-700,
        body.dark-mode h3.font-bold {
            color: #f1f5f9 !important;
        }
        body.dark-mode .text-slate-500 { color: #94a3b8 !important; }
        body.dark-mode .border-slate-200 { border-color: #334155 !important; }
        body.dark-mode .hover\:bg-slate-50:hover { background-color: #334155 !important; }
        body.dark-mode .bg-green-50 { background-color: #064e3b !important; border-color: #059669 !important; }
        body.dark-mode .bg-green-50 .text-green-600 { color: #34d399 !important; }
        body.dark-mode .bg-red-50 { background-color: #7f1d1d !important; border-color: #ef4444 !important; }
        body.dark-mode .bg-red-50 .text-red-500 { color: #d54444 !important; }
        body.dark-mode .btn-submit { background: linear-gradient(135deg, #059669, #047857); }
        body.dark-mode #prevBtn { background-color: #334155 !important; color: #f1f5f9 !important; }
        body.dark-mode #prevBtn:hover { background-color: #475569 !important; }
        body.dark-mode #nextBtn { background-color: #4f46e5 !important; }
        body.dark-mode #nextBtn:hover { background-color: #6366f1 !important; }
        body.dark-mode .shadow-md { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
        body.dark-mode .bg-gray-200 { background-color: #334155 !important; }
        body.dark-mode .modal-content { background: #1e293b; color: #e2e8f0; }
        body.dark-mode #link { color: #fffcff !important; }

    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl p-6 mb-6 shadow-md text-center no-print relative">
            <button id="darkModeToggle" class="absolute left-4 top-4 text-xl text-slate-600 hover:text-slate-800 transition">
                <i class="fas fa-moon"></i>
            </button>
            <div class="bg-emerald-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-3">
                <i class="fas fa-graduation-cap text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">الامتحان <span class="text-emerald-600">الإلكتروني</span></h1>
            <p class="text-slate-500 text-sm pt-[10px]"><a id="creator-name" href="https://eng-mohammad-ashraf.github.io/Mohammad-Ashraf/" target="_blank" rel="noopener noreferrer" ><span id="link" style="color: #000;">This site created by </span>Mohammad Ashraf</a></p>
        </div>

        <div class="bg-white rounded-xl p-3 mb-4 shadow-sm no-print">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-2">
                    <i class="fas fa-hourglass-half text-amber-600"></i>
                    <span class="font-bold text-slate-700">الوقت المتبقي:</span>
                    <span id="timerDisplay" class="text-xl font-mono font-bold text-amber-700">--:--</span>
                </div>
                <div class="text-sm text-slate-600">
                    <i class="fas fa-check-circle text-emerald-600"></i> <span id="answeredCount">0</span> / <span id="totalQuestions">0</span>
                </div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progressBarFill" class="bg-emerald-600 h-2.5 rounded-full progress-bar" style="width: 0%"></div>
            </div>
            <div class="text-center mt-2 text-sm text-slate-500">
                السؤال <span id="currentQIndex">1</span> من <span id="totalQSpan">0</span>
            </div>
        </div>

        <div id="loadingIndicator" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto"></div>
            <p class="mt-3 text-slate-500">جاري تحميل الأسئلة...</p>
        </div>

        <div id="quizContainer" class="hidden"></div>

        <div id="navButtons" class="flex justify-between gap-4 mt-6 no-print hidden">
            <button id="prevBtn" class="nav-btn bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 px-6 rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-arrow-right ml-2"></i> السابق
            </button>
            <button id="nextBtn" class="nav-btn bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-xl transition">
                التالي <i class="fas fa-arrow-left mr-2"></i>
            </button>
        </div>

        <div id="submitArea" class="mt-8 text-center hidden no-print">
            <button id="submitQuizBtn" class="btn-submit bg-green-800 text-white font-bold py-3 px-8 rounded-xl shadow-lg text-lg transition hover:scale-105">
                <i class="fas fa-check-circle ml-2"></i> إنهاء الامتحان
            </button>
        </div>

        <div id="resultCard" class="mt-8 bg-white rounded-2xl shadow-xl hidden"></div>
    </div>

    <div id="errorsModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b pb-2 mb-3">
                <h3 class="text-xl font-bold text-red-600">❌ الأسئلة الخاطئة</h3>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
            </div>
            <div id="errorsList" class="space-y-3 max-h-96 overflow-y-auto"></div>
            <div class="mt-4 text-center">
                <button id="closeModalFooterBtn" class="bg-indigo-600 text-white px-4 py-1 rounded-lg">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        
        let quizQuestions = [];
        let userAnswers = [];
        let quizSubmitted = false;
        let timerInterval = null;
        let timeLeftSeconds = 0;
        let currentQuestionIndex = 0;
        let wrongQuestions = [];
        const GIST_ID = '7f7b08150e34fc0c8a5b00063944942a';
        const STORAGE_KEY = `exam_answers_${GIST_ID}`;

        function updateProgress() {
            const answered = userAnswers.filter(a => a !== null && a !== -1).length;
            const total = quizQuestions.length;
            document.getElementById('answeredCount').innerText = answered;
            document.getElementById('totalQuestions').innerText = total;
            document.getElementById('totalQSpan').innerText = total;
            const percent = total === 0 ? 0 : (answered / total) * 100;
            document.getElementById('progressBarFill').style.width = `${percent}%`;
        }

        function updateCurrentDisplay() {
            document.getElementById('currentQIndex').innerText = currentQuestionIndex + 1;
            document.getElementById('prevBtn').disabled = (currentQuestionIndex === 0);
        }

        function showToast(message, isWarning = false) {
            let toast = document.querySelector('.toast-save');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = `toast-save ${isWarning ? 'toast-warning bg-red-600' : 'bg-gray-800'} text-white px-3 py-1 rounded-full text-sm z-50`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function persistAnswers() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers)); }
        function loadPersistedAnswers() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length === quizQuestions.length) {
                        userAnswers = parsed;
                        updateProgress();
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        }

        function renderCurrentQuestion() {
            const container = document.getElementById('quizContainer');
            if (!quizQuestions.length) return;
            const q = quizQuestions[currentQuestionIndex];
            let choicesHtml = '';
            q.choices.forEach((choice, chIdx) => {
                const isChecked = (userAnswers[currentQuestionIndex] === chIdx) ? 'checked' : '';
                let bgClass = '', badge = '';
                if (quizSubmitted) {
                    if (chIdx === q.correctChoiceIndex) {
                        bgClass = 'bg-green-50 border-green-300';
                        badge = '<span class="mr-2 text-green-600 text-xs">✓ الإجابة الصحيحة</span>';
                    } else if (userAnswers[currentQuestionIndex] === chIdx) {
                        bgClass = 'bg-red-50 border-red-300';
                        badge = '<span class="mr-2 text-red-500 text-xs">✗ إجابتك</span>';
                    }
                }
                choicesHtml += `
                    <label class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer transition ${bgClass}">
                        <input type="radio" name="currentQ" value="${chIdx}" ${isChecked} data-choice="${chIdx}" class="quiz-radio w-5 h-5 text-emerald-600" ${quizSubmitted ? 'disabled' : ''}>
                        <div class="flex-1"><span class="font-medium">${escapeHtml(choice)}</span>${badge}</div>
                    </label>
                `;
            });
            const html = `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden question-slide">
                    <div class="p-5 bg-gradient-to-r from-slate-50 to-white">
                        <h3 class="font-bold text-slate-800 text-lg">${currentQuestionIndex+1}. ${escapeHtml(q.text)}</h3>
                    </div>
                    <div class="p-4 space-y-2">${choicesHtml}</div>
                </div>
            `;
            container.innerHTML = html;
            if (!quizSubmitted) {
                document.querySelectorAll('#quizContainer .quiz-radio').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (quizSubmitted) return;
                        const chosen = parseInt(e.target.value);
                        if (userAnswers[currentQuestionIndex] !== chosen) {
                            userAnswers[currentQuestionIndex] = chosen;
                            persistAnswers();
                            updateProgress();
                            showToast('✓ تم حفظ الإجابة');
                        }
                    });
                });
            }
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timeLeftSeconds / 60);
            const secs = timeLeftSeconds % 60;
            const timerEl = document.getElementById('timerDisplay');
            timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeftSeconds <= 60) timerEl.classList.add('timer-danger');
            else timerEl.classList.remove('timer-danger');
        }

        function startTimer(seconds) {
            if (timerInterval) clearInterval(timerInterval);
            timeLeftSeconds = seconds;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (quizSubmitted) return;
                if (timeLeftSeconds <= 1) {
                    clearInterval(timerInterval);
                    if (!quizSubmitted) {
                        for (let i = 0; i < userAnswers.length; i++) if (userAnswers[i] === null) userAnswers[i] = -1;
                        submitQuiz(true);
                    }
                } else {
                    timeLeftSeconds--;
                    updateTimerDisplay();
                }
            }, 1000);
        }

        async function loadQuestions() {
            const loadingDiv = document.getElementById('loadingIndicator');
            const container = document.getElementById('quizContainer');
            const navDiv = document.getElementById('navButtons');
            const cachedData = localStorage.getItem('quizData');
            if (cachedData) {
                try {
                    const parsedCache = JSON.parse(cachedData);
                    if (Date.now() - parsedCache.timestamp < 10 * 60 * 1000) {
                        quizQuestions = parsedCache.questions || [];
                        const durationMinutes = parsedCache.duration || 30;
                        userAnswers = new Array(quizQuestions.length).fill(null);
                        loadPersistedAnswers();
                        timeLeftSeconds = durationMinutes * 60;
                        startTimer(timeLeftSeconds);
                        currentQuestionIndex = 0;
                        renderCurrentQuestion();
                        loadingDiv.classList.add('hidden');
                        container.classList.remove('hidden');
                        navDiv.classList.remove('hidden');
                        document.getElementById('submitArea').classList.remove('hidden');
                        updateProgress();
                        updateCurrentDisplay();
                        return;
                    }
                } catch(e) {}
            }
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data.files || !data.files['questions.json']) throw new Error('questions.json غير موجود');
                const content = data.files['questions.json'].content;
                const parsed = JSON.parse(content);
                quizQuestions = parsed.questions || [];
                const durationMinutes = parsed.duration || 30;
                localStorage.setItem('quizData', JSON.stringify({ timestamp: Date.now(), questions: quizQuestions, duration: durationMinutes }));
                userAnswers = new Array(quizQuestions.length).fill(null);
                loadPersistedAnswers();
                timeLeftSeconds = durationMinutes * 60;
                startTimer(timeLeftSeconds);
                currentQuestionIndex = 0;
                renderCurrentQuestion();
                loadingDiv.classList.add('hidden');
                container.classList.remove('hidden');
                navDiv.classList.remove('hidden');
                document.getElementById('submitArea').classList.remove('hidden');
                updateProgress();
                updateCurrentDisplay();
            } catch(error) {
                loadingDiv.innerHTML = `<div class="bg-red-50 rounded-xl p-8 text-center max-w-md mx-auto border border-red-200">
                    <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-3"></i>
                    <p class="text-slate-800 font-bold mb-2">خطأ في تحميل الأسئلة</p>
                    <p class="text-slate-600 text-sm mb-4">${error.message}</p>
                    <button onclick="location.reload()" class="bg-emerald-600 text-white px-5 py-2 rounded-lg">🔄 إعادة المحاولة</button>
                </div>`;
            }
        }

        // ========== أهم جزء: منع الانتقال بدون إجابة ==========
        function goNext() {
            // التحقق من وجود إجابة للسؤال الحالي
            if (userAnswers[currentQuestionIndex] === null || userAnswers[currentQuestionIndex] === -1) {
                showToast('⚠️ الرجاء اختيار إجابة قبل الانتقال إلى السؤال التالي', true);
                // تأثير هز بسيط للبطاقة
                const currentCard = document.querySelector('.question-slide');
                if (currentCard) {
                    currentCard.style.transform = 'translateX(-5px)';
                    setTimeout(() => { currentCard.style.transform = ''; }, 200);
                }
                return;
            }
            
            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                renderCurrentQuestion();
                updateCurrentDisplay();
            }
        }

        function goPrev() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderCurrentQuestion();
                updateCurrentDisplay();
            }
        }

        function showErrorsModal() {
            const modal = document.getElementById('errorsModal');
            const errorsListDiv = document.getElementById('errorsList');
            if (!wrongQuestions.length) errorsListDiv.innerHTML = '<p class="text-green-600">🎉 مبارك! لا توجد أخطاء.</p>';
            else {
                let html = '';
                wrongQuestions.forEach((item, idx) => {
                    html += `<div class="border border-red-200 rounded-lg p-3 bg-red-50 dark:bg-red-900/30">
                        <p class="font-bold">${idx+1}. ${escapeHtml(item.text)}</p>
                        <p class="text-sm mt-1"><span class="font-semibold">إجابتك:</span> ${escapeHtml(item.userAnswer)}</p>
                        <p class="text-sm"><span class="font-semibold text-green-700">الإجابة الصحيحة:</span> ${escapeHtml(item.correctAnswer)}</p>
                    </div>`;
                });
                errorsListDiv.innerHTML = html;
            }
            modal.classList.add('active');
        }
        function closeModal() { document.getElementById('errorsModal').classList.remove('active'); }

        function submitQuiz(forced = false) {
            if (quizSubmitted) return;
            if (!forced) {
                const unanswered = userAnswers.some(ans => ans === null || ans === -1);
                if (unanswered) { if (!confirm("⚠️ لا يزال هناك أسئلة لم تُجب عليها. هل تريد إنهاء الامتحان الآن؟")) return; }
                else { if (!confirm("📝 هل أنت متأكد من إنهاء الامتحان؟ لن تتمكن من تعديل الإجابات بعد الآن.")) return; }
            }
            quizSubmitted = true;
            if (timerInterval) clearInterval(timerInterval);
            let score = 0;
            wrongQuestions = [];
            quizQuestions.forEach((q, idx) => {
                const userChoiceIndex = userAnswers[idx];
                const isCorrect = (userChoiceIndex === q.correctChoiceIndex);
                if (isCorrect) score++;
                else {
                    wrongQuestions.push({
                        text: q.text,
                        userAnswer: (userChoiceIndex !== null && userChoiceIndex !== -1) ? q.choices[userChoiceIndex] : 'لم يجب',
                        correctAnswer: q.choices[q.correctChoiceIndex]
                    });
                }
            });
            const total = quizQuestions.length;
            const percentage = Math.round((score / total) * 100);
            const resultDiv = document.getElementById('resultCard');
            let gradeClass = percentage >= 70 ? 'text-emerald-600' : (percentage >= 50 ? 'text-amber-600' : 'text-rose-600');
            let icon = percentage >= 70 ? 'fa-crown' : (percentage >= 50 ? 'fa-face-smile' : 'fa-book');
            let feedback = percentage >= 70 ? 'ممتاز! 🎉' : (percentage >= 50 ? 'جيد جداً 📚' : 'بحاجة للمذاكرة 💪');
            resultDiv.innerHTML = `
                <div class="p-6 text-center">
                    <i class="fas ${icon} text-5xl ${gradeClass} mb-3"></i>
                    <h2 class="text-2xl font-bold">نتيجتك: ${score} / ${total}</h2>
                    <div class="text-4xl font-extrabold ${gradeClass} mt-2">${percentage}%</div>
                    <p class="text-slate-500 mt-2">${feedback}</p>
                    <div class="flex justify-center gap-3 mt-4">
                        <button id="showErrorsBtn" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 px-4 rounded-lg transition">❌ عرض الأخطاء (${wrongQuestions.length})</button>
                        <button id="restartExamBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg transition">🔄 إعادة الامتحان</button>
                    </div>
                </div>
            `;
            resultDiv.classList.remove('hidden');
            document.getElementById('submitArea').classList.add('hidden');
            document.getElementById('navButtons').classList.add('hidden');
            renderCurrentQuestion();
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('showErrorsBtn')?.addEventListener('click', showErrorsModal);
            document.getElementById('restartExamBtn')?.addEventListener('click', () => location.reload());
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }

        function initDarkMode() {
            const darkMode = localStorage.getItem('darkMode') === 'true';
            if (darkMode) document.body.classList.add('dark-mode');
            const toggle = document.getElementById('darkModeToggle');
            toggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDark);
                toggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
            toggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        document.getElementById('prevBtn')?.addEventListener('click', goPrev);
        document.getElementById('nextBtn')?.addEventListener('click', goNext);
        document.getElementById('submitQuizBtn')?.addEventListener('click', () => submitQuiz(false));
        document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
        document.getElementById('closeModalFooterBtn')?.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('errorsModal')) closeModal(); });
        initDarkMode();
        loadQuestions();

        const creator = document.querySelector(".creator-name");

creator.addEventListener("click", function (e) {

    e.preventDefault();

    creator.classList.add("clicked");

    // انتقال بعد الانيميشن
    setTimeout(() => {
        window.location.href = "portfolio-link";
    }, 800);

});
    </script>
