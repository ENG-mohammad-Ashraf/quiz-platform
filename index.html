<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الامتحان الإلكتروني | منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); }
        .btn-submit { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .loading { display: flex; justify-content: center; align-items: center; min-height: 400px; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-md text-center">
            <div class="bg-emerald-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-3">
                <i class="fas fa-graduation-cap text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold">الامتحان <span class="text-emerald-600">الإلكتروني</span></h1>
        </div>

        <div id="loadingIndicator" class="loading">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto"></div>
            <p class="mt-3">جاري تحميل الأسئلة من السحابة...</p>
        </div>

        <div id="quizContainer" class="space-y-5 hidden"></div>
        <div id="submitArea" class="mt-8 text-center hidden">
            <button id="submitQuizBtn" class="btn-submit text-white font-bold py-3 px-8 rounded-xl shadow-lg text-lg">إنهاء الامتحان</button>
        </div>
        <div id="resultCard" class="mt-8 bg-white rounded-2xl shadow-xl hidden"></div>
    </div>

    <script>
        let quizQuestions = [];
        let userAnswers = [];
        let quizSubmitted = false;
        const GIST_ID = '7f7b08150e34fc0c8a5b00063944942a'; // 👈 ضع معرف Gist هنا
        
        async function loadQuestions() {
            try {
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                const content = data.files['questions.json']?.content;
                if (content) {
                    const parsed = JSON.parse(content);
                    quizQuestions = parsed.questions || [];
                    if (quizQuestions.length === 0) throw new Error();
                    userAnswers = new Array(quizQuestions.length).fill(null);
                    renderQuiz();
                    return;
                }
            } catch(e) {
                document.getElementById('loadingIndicator').innerHTML = `<div class="bg-red-50 p-8 text-center rounded-xl"><i class="fas fa-database text-red-400 text-3xl"></i><p class="mt-2">خطأ في تحميل الأسئلة</p><button onclick="location.reload()" class="mt-3 bg-emerald-600 text-white px-4 py-2 rounded-lg">إعادة المحاولة</button></div>`;
            }
        }
        
        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            document.getElementById('loadingIndicator').classList.add('hidden');
            container.classList.remove('hidden');
            document.getElementById('submitArea').classList.remove('hidden');
            
            let html = `<div class="mb-4 text-sm bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full inline-block">📋 عدد الأسئلة: ${quizQuestions.length}</div>`;
            quizQuestions.forEach((q, idx) => {
                let choicesHtml = '';
                q.choices.forEach((choice, chIdx) => {
                    const isChecked = (userAnswers[idx] === chIdx) ? 'checked' : '';
                    choicesHtml += `<label class="flex items-center gap-3 p-3 rounded-xl border hover:bg-slate-50 cursor-pointer">
                        <input type="radio" name="q${idx}" value="${chIdx}" ${isChecked} data-qidx="${idx}" class="quiz-radio w-5 h-5 text-emerald-600">
                        <span>${escapeHtml(choice)}</span>
                    </label>`;
                });
                html += `<div class="bg-white rounded-xl shadow-sm border p-5"><h3 class="font-bold text-lg mb-3">${idx+1}. ${escapeHtml(q.text)}</h3><div class="space-y-2">${choicesHtml}</div></div>`;
            });
            container.innerHTML = html;
            attachEvents();
        }
        
        function attachEvents() {
            document.querySelectorAll('.quiz-radio').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (quizSubmitted) return;
                    const qIdx = parseInt(e.target.dataset.qidx);
                    userAnswers[qIdx] = parseInt(e.target.value);
                });
            });
        }
        
        function submitQuiz() {
            if (quizSubmitted || userAnswers.some(a => a === null)) {
                alert("الرجاء الإجابة على جميع الأسئلة");
                return;
            }
            quizSubmitted = true;
            let score = 0;
            quizQuestions.forEach((q, idx) => { if (userAnswers[idx] === q.correctChoiceIndex) score++; });
            const percentage = Math.round((score / quizQuestions.length) * 100);
            document.getElementById('resultCard').innerHTML = `<div class="p-6 text-center"><i class="fas fa-chart-line text-4xl text-emerald-500"></i><h2 class="text-2xl font-bold mt-2">نتيجتك: ${score}/${quizQuestions.length}</h2><p class="text-3xl font-bold text-emerald-600 mt-2">${percentage}%</p><button onclick="location.reload()" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded-lg">إعادة الامتحان</button></div>`;
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('submitArea').classList.add('hidden');
            document.querySelectorAll('.quiz-radio').forEach(r => r.disabled = true);
        }
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        document.getElementById('submitQuizBtn')?.addEventListener('click', submitQuiz);
        loadQuestions();
    </script>
</body>
</html>
