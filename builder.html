<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مدير الأسئلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height: 100vh; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); }
        .btn-save { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .question-card { transition: 0.2s; }
        input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); border-color: #4f46e5; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; animation: fadeInOut 3s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 10% { opacity: 1; transform: translateX(-50%) translateY(0); } 90% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
    </style>
</head>
<body class="antialiased">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-md">
            <div class="flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-pen-ruler text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">لوحة تحكم الأسئلة</h1>
                        <p class="text-slate-500 text-sm">أضف أو عدل الأسئلة - التغييرات تظهر تلقائياً للمستخدمين</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="saveToStorageBtn" class="btn-save text-white px-5 py-2 rounded-xl shadow-md transition hover:scale-105">
                        <i class="fas fa-save ml-2"></i> حفظ ونشر للمستخدمين
                    </button>
                    <button id="addQuestionBtn" class="btn-primary text-white px-5 py-2 rounded-xl shadow-md transition hover:scale-105">
                        <i class="fas fa-plus-circle ml-2"></i> إضافة سؤال
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white/80 backdrop-blur rounded-xl p-4 mb-6 flex flex-wrap justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-100 p-2 rounded-full"><i class="fas fa-question-circle text-indigo-600"></i></div>
                <span class="font-bold text-slate-700">عدد الأسئلة: <span id="questionCount">0</span></span>
            </div>
            <div class="text-xs text-slate-500"><i class="fas fa-globe"></i> سيتم نشر التغييرات للمستخدمين بعد الضغط على "حفظ"</div>
        </div>

        <div id="questionsContainer" class="space-y-4"></div>

        <div class="fixed bottom-6 right-6 md:hidden">
            <button id="fabAddBtn" class="bg-indigo-600 text-white p-4 rounded-full shadow-xl"><i class="fas fa-plus text-xl"></i></button>
        </div>
    </div>

    <script>
        let questions = [];
        const STORAGE_KEY = 'quizPlatformQuestions';

        function loadQuestions() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    questions = JSON.parse(stored);
                } catch(e) { questions = getDefaultQuestions(); }
            } else {
                questions = getDefaultQuestions();
            }
            renderQuestions();
        }

        function getDefaultQuestions() {
            return [
                { id: Date.now() + '1', text: "ما هي عاصمة المملكة العربية السعودية؟", choices: ["جدة", "مكة", "الرياض", "الدمام"], correctChoiceIndex: 2 },
                { id: Date.now() + '2', text: "ما هي لغة البرمجة الأكثر استخداماً لتطوير الويب؟", choices: ["Python", "Java", "JavaScript", "C++"], correctChoiceIndex: 2 },
                { id: Date.now() + '3', text: "من هو مؤسس شركة مايكروسوفت؟", choices: ["ستيف جوبز", "بيل غيتس", "مارك زوكربيرج", "إيلون ماسك"], correctChoiceIndex: 1 }
            ];
        }

        function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 8); }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;
            if (questions.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-xl p-8 text-center text-slate-500"><i class="fas fa-inbox text-4xl mb-2"></i><p>لا توجد أسئلة. أضف سؤالاً جديداً</p></div>`;
                document.getElementById('questionCount').innerText = '0';
                return;
            }

            let html = '';
            questions.forEach((q, idx) => {
                const qid = q.id;
                let choicesHtml = '';
                q.choices.forEach((choice, chIdx) => {
                    const isChecked = (q.correctChoiceIndex === chIdx) ? 'checked' : '';
                    choicesHtml += `
                        <div class="flex items-center gap-2 bg-gray-50 rounded-lg p-2 mb-2">
                            <input type="radio" name="correct_${qid}" value="${chIdx}" ${isChecked} data-qid="${qid}" data-choice-idx="${chIdx}" class="correct-radio w-4 h-4 text-indigo-600">
                            <input type="text" value="${escapeHtml(choice)}" data-qid="${qid}" data-choice-idx="${chIdx}" class="choice-text flex-1 bg-transparent border-b border-gray-200 p-1 text-sm focus:border-indigo-400">
                            ${q.choices.length > 2 ? `<button type="button" data-qid="${qid}" data-choice-idx="${chIdx}" class="remove-choice text-red-500 hover:text-red-700 px-2"><i class="fas fa-trash-alt"></i></button>` : '<span class="w-6"></span>'}
                        </div>
                    `;
                });

                html += `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden question-card">
                        <div class="p-4 bg-gradient-to-r from-indigo-50 to-white border-b">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">سؤال ${idx+1}</span>
                                    <input type="text" value="${escapeHtml(q.text)}" data-qid="${qid}" class="question-text w-full mt-2 text-lg font-bold bg-transparent border-0 focus:ring-0 p-0" placeholder="أدخل نص السؤال...">
                                </div>
                                <button data-qid="${qid}" class="delete-question text-gray-400 hover:text-red-600 transition"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="text-xs text-gray-500 mb-2">الاختيارات (اختر الإجابة الصحيحة بواسطة النقطة)</div>
                            <div class="choices-area">${choicesHtml}</div>
                            <button data-qid="${qid}" class="add-choice mt-3 text-indigo-600 text-sm hover:text-indigo-800"><i class="fas fa-plus-circle"></i> إضافة اختيار</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.getElementById('questionCount').innerText = questions.length;
        }

        function publishToUsers() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
            showToast("✅ تم حفظ الأسئلة! المستخدمون سيرون التحديثات عند تحديث الصفحة", "success");
        }

        function addNewQuestion() {
            questions.push({ id: generateId(), text: "سؤال جديد", choices: ["خيار 1", "خيار 2", "خيار 3"], correctChoiceIndex: 0 });
            renderQuestions();
            showToast("✨ تم إضافة سؤال جديد (اضغط حفظ لنشره)", "info");
        }

        function deleteQuestion(qid) {
            questions = questions.filter(q => q.id !== qid);
            renderQuestions();
            showToast("🗑️ تم حذف السؤال (اضغط حفظ لنشره)", "info");
        }

        function addChoiceToQuestion(qid) {
            const q = questions.find(q => q.id === qid);
            if (q) { q.choices.push(`خيار ${q.choices.length + 1}`); renderQuestions(); }
        }

        function removeChoiceFromQuestion(qid, choiceIdx) {
            const q = questions.find(q => q.id === qid);
            if (q && q.choices.length > 2) {
                q.choices.splice(choiceIdx, 1);
                if (q.correctChoiceIndex >= q.choices.length) q.correctChoiceIndex = q.choices.length - 1;
                renderQuestions();
            } else if (q && q.choices.length <= 2) {
                showToast("⚠️ لا يمكن حذف الخيار - يجب وجود خيارين على الأقل", "warning");
            }
        }

        function updateQuestionText(qid, newText) {
            const q = questions.find(q => q.id === qid);
            if (q) q.text = newText;
        }

        function updateChoiceText(qid, choiceIdx, newText) {
            const q = questions.find(q => q.id === qid);
            if (q && q.choices[choiceIdx]) q.choices[choiceIdx] = newText;
        }

        function updateCorrectAnswer(qid, choiceIdx) {
            const q = questions.find(q => q.id === qid);
            if (q) q.correctChoiceIndex = parseInt(choiceIdx, 10);
        }

        function showToast(msg, type = "info") {
            let toast = document.getElementById('customToast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.id = 'customToast';
            let bgColor = type === 'success' ? 'bg-emerald-600' : (type === 'error' ? 'bg-red-600' : (type === 'warning' ? 'bg-amber-600' : 'bg-slate-800'));
            toast.className = `toast ${bgColor} text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => { if(toast) toast.remove(); }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function setupEvents() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;

            container.addEventListener('input', (e) => {
                if (e.target.classList.contains('question-text')) {
                    updateQuestionText(e.target.getAttribute('data-qid'), e.target.value);
                }
                if (e.target.classList.contains('choice-text')) {
                    updateChoiceText(e.target.getAttribute('data-qid'), parseInt(e.target.getAttribute('data-choice-idx')), e.target.value);
                }
            });

            container.addEventListener('change', (e) => {
                if (e.target.classList.contains('correct-radio')) {
                    updateCorrectAnswer(e.target.getAttribute('data-qid'), e.target.getAttribute('data-choice-idx'));
                }
            });

            container.addEventListener('click', (e) => {
                const del = e.target.closest('.delete-question');
                if (del) { deleteQuestion(del.getAttribute('data-qid')); return; }

                const addChoice = e.target.closest('.add-choice');
                if (addChoice) { addChoiceToQuestion(addChoice.getAttribute('data-qid')); return; }

                const remChoice = e.target.closest('.remove-choice');
                if (remChoice) {
                    removeChoiceFromQuestion(remChoice.getAttribute('data-qid'), parseInt(remChoice.getAttribute('data-choice-idx')));
                    return;
                }
            });
        }

        document.getElementById('addQuestionBtn')?.addEventListener('click', addNewQuestion);
        document.getElementById('fabAddBtn')?.addEventListener('click', addNewQuestion);
        document.getElementById('saveToStorageBtn')?.addEventListener('click', publishToUsers);

        loadQuestions();
        setupEvents();
    </script>
</body>
</html>
