<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مدير الأسئلة (Gist)</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); }
        .btn-save { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; animation: fadeInOut 3s ease; }
        @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-md">
            <div class="flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-pen-ruler text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">لوحة تحكم الأسئلة</h1>
                        <p class="text-slate-500 text-sm">الأسئلة تُحفظ على GitHub - متاحة لجميع المستخدمين فوراً</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="saveToGistBtn" class="btn-save text-white px-5 py-2 rounded-xl shadow-md hover:scale-105 transition">
                        <i class="fas fa-cloud-upload-alt ml-2"></i> حفظ ونشر للجميع
                    </button>
                    <button id="addQuestionBtn" class="btn-primary text-white px-5 py-2 rounded-xl shadow-md hover:scale-105 transition">
                        <i class="fas fa-plus-circle ml-2"></i> إضافة سؤال
                    </button>
                </div>
            </div>
        </div>

        <!-- إعدادات Gist -->
        <div class="bg-amber-50 rounded-xl p-4 mb-6 border border-amber-200">
            <div class="flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-sm font-bold text-amber-800 block mb-1">معرف Gist (ID)</label>
                    <input type="text" id="gistIdInput" class="w-full px-3 py-2 border border-amber-300 rounded-lg text-sm" placeholder="مثال: abc123def456" value="">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="text-sm font-bold text-amber-800 block mb-1">GitHub Token (صلاحية gist)</label>
                    <input type="password" id="gistTokenInput" class="w-full px-3 py-2 border border-amber-300 rounded-lg text-sm" placeholder="أدخل التوكن هنا">
                </div>
                <div>
                    <button id="testGistBtn" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-sm">🔍 اختبار الاتصال</button>
                </div>
            </div>
            <p class="text-xs text-amber-700 mt-2">⚠️ التوكن يحفظ فقط في متصفحك. لا تشاركه مع أحد.</p>
        </div>

        <div class="bg-white/80 backdrop-blur rounded-xl p-4 mb-6 flex justify-between items-center">
            <span class="font-bold">عدد الأسئلة: <span id="questionCount">0</span></span>
            <span id="syncStatus" class="text-xs text-slate-500"></span>
        </div>

        <div id="questionsContainer" class="space-y-4"></div>
        <div class="fixed bottom-6 right-6 md:hidden">
            <button id="fabAddBtn" class="bg-indigo-600 text-white p-4 rounded-full shadow-xl"><i class="fas fa-plus text-xl"></i></button>
        </div>
    </div>

    <script>
        let questions = [];
        let gistId = localStorage.getItem('quiz_gist_id') || '';
        let gistToken = localStorage.getItem('quiz_gist_token') || '';
        
        // تحميل الإعدادات المحفوظة
        document.getElementById('gistIdInput').value = gistId;
        document.getElementById('gistTokenInput').value = gistToken;
        
        // حفظ الإعدادات عند التغيير
        document.getElementById('gistIdInput').addEventListener('change', (e) => {
            gistId = e.target.value;
            localStorage.setItem('quiz_gist_id', gistId);
        });
        document.getElementById('gistTokenInput').addEventListener('change', (e) => {
            gistToken = e.target.value;
            localStorage.setItem('quiz_gist_token', gistToken);
        });
        
        // تحميل الأسئلة من Gist
        async function loadQuestionsFromGist() {
            if (!gistId) {
                document.getElementById('syncStatus').innerHTML = '⚠️ يرجى إدخال معرف Gist';
                return false;
            }
            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`);
                if (!response.ok) throw new Error('Gist not found');
                const data = await response.json();
                const content = data.files['questions.json']?.content;
                if (content) {
                    const parsed = JSON.parse(content);
                    questions = parsed.questions || [];
                    // تأكد من صحة البيانات
                    questions = questions.map(q => ({
                        ...q,
                        choices: q.choices || ["خيار 1", "خيار 2", "خيار 3"],
                        correctChoiceIndex: q.correctChoiceIndex || 0
                    }));
                    renderQuestions();
                    document.getElementById('syncStatus').innerHTML = '✅ تم التحميل من Gist';
                    return true;
                }
            } catch(e) {
                document.getElementById('syncStatus').innerHTML = '❌ فشل التحميل: ' + e.message;
            }
            return false;
        }
        
        // حفظ الأسئلة إلى Gist
        async function saveQuestionsToGist() {
            if (!gistId || !gistToken) {
                alert('الرجاء إدخال معرف Gist والتوكن أولاً');
                return;
            }
            
            const content = JSON.stringify({ questions: questions }, null, 2);
            
            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${gistToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            'questions.json': { content: content }
                        }
                    })
                });
                
                if (response.ok) {
                    showToast('✅ تم حفظ الأسئلة ونشرها لجميع المستخدمين!', 'success');
                    document.getElementById('syncStatus').innerHTML = '✅ تم النشر بنجاح';
                } else {
                    const error = await response.json();
                    showToast('❌ خطأ في الحفظ: ' + error.message, 'error');
                }
            } catch(e) {
                showToast('❌ فشل الاتصال: ' + e.message, 'error');
            }
        }
        
        // اختبار الاتصال
        document.getElementById('testGistBtn').addEventListener('click', async () => {
            if (!gistId) {
                alert('أدخل معرف Gist أولاً');
                return;
            }
            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`);
                if (response.ok) {
                    showToast('✅ الاتصال ناجح! يمكنك الآن حفظ الأسئلة', 'success');
                } else {
                    showToast('❌ Gist غير موجود، تأكد من المعرف', 'error');
                }
            } catch(e) {
                showToast('❌ فشل الاتصال', 'error');
            }
        });
        
        // باقي دوال إدارة الأسئلة (نفس السابق)
        function getDefaultQuestions() {
            return [
                { id: Date.now() + '1', text: "ما هي عاصمة المملكة العربية السعودية؟", choices: ["جدة", "مكة", "الرياض", "الدمام"], correctChoiceIndex: 2 },
                { id: Date.now() + '2', text: "ما هي لغة البرمجة الأكثر استخداماً لتطوير الويب؟", choices: ["Python", "Java", "JavaScript", "C++"], correctChoiceIndex: 2 }
            ];
        }
        
        function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 8); }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;
            if (questions.length === 0) {
                container.innerHTML = `<div class="bg-white rounded-xl p-8 text-center"><i class="fas fa-inbox text-4xl mb-2"></i><p>لا توجد أسئلة</p></div>`;
                document.getElementById('questionCount').innerText = '0';
                return;
            }
            
            let html = '';
            questions.forEach((q, idx) => {
                const qid = q.id;
                let choicesHtml = '';
                q.choices.forEach((choice, chIdx) => {
                    const isChecked = (q.correctChoiceIndex === chIdx) ? 'checked' : '';
                    choicesHtml += `
                        <div class="flex items-center gap-2 bg-gray-50 rounded-lg p-2 mb-2">
                            <input type="radio" name="correct_${qid}" value="${chIdx}" ${isChecked} data-qid="${qid}" data-choice-idx="${chIdx}" class="correct-radio w-4 h-4 text-indigo-600">
                            <input type="text" value="${escapeHtml(choice)}" data-qid="${qid}" data-choice-idx="${chIdx}" class="choice-text flex-1 bg-transparent border-b border-gray-200 p-1 text-sm">
                            ${q.choices.length > 2 ? `<button data-qid="${qid}" data-choice-idx="${chIdx}" class="remove-choice text-red-500 px-2"><i class="fas fa-trash-alt"></i></button>` : '<span class="w-6"></span>'}
                        </div>
                    `;
                });
                html += `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden">
                        <div class="p-4 bg-indigo-50 border-b">
                            <div class="flex justify-between">
                                <input type="text" value="${escapeHtml(q.text)}" data-qid="${qid}" class="question-text w-full text-lg font-bold bg-transparent border-0 p-0">
                                <button data-qid="${qid}" class="delete-question text-gray-400 hover:text-red-600"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="choices-area">${choicesHtml}</div>
                            <button data-qid="${qid}" class="add-choice mt-3 text-indigo-600 text-sm"><i class="fas fa-plus-circle"></i> إضافة اختيار</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.getElementById('questionCount').innerText = questions.length;
        }
        
        function addNewQuestion() {
            questions.push({ id: generateId(), text: "سؤال جديد", choices: ["خيار 1", "خيار 2", "خيار 3"], correctChoiceIndex: 0 });
            renderQuestions();
            showToast("✨ تم إضافة سؤال (اضغط حفظ للنشر)", "info");
        }
        
        function deleteQuestion(qid) {
            questions = questions.filter(q => q.id !== qid);
            renderQuestions();
        }
        
        function addChoiceToQuestion(qid) {
            const q = questions.find(q => q.id === qid);
            if (q) { q.choices.push(`خيار ${q.choices.length + 1}`); renderQuestions(); }
        }
        
        function removeChoiceFromQuestion(qid, choiceIdx) {
            const q = questions.find(q => q.id === qid);
            if (q && q.choices.length > 2) {
                q.choices.splice(choiceIdx, 1);
                if (q.correctChoiceIndex >= q.choices.length) q.correctChoiceIndex = q.choices.length - 1;
                renderQuestions();
            }
        }
        
        function updateQuestionText(qid, newText) {
            const q = questions.find(q => q.id === qid);
            if (q) q.text = newText;
        }
        
        function updateChoiceText(qid, choiceIdx, newText) {
            const q = questions.find(q => q.id === qid);
            if (q && q.choices[choiceIdx]) q.choices[choiceIdx] = newText;
        }
        
        function updateCorrectAnswer(qid, choiceIdx) {
            const q = questions.find(q => q.id === qid);
            if (q) q.correctChoiceIndex = parseInt(choiceIdx, 10);
        }
        
        function showToast(msg, type) {
            let toast = document.getElementById('customToast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.className = `toast ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'} text-white`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }
        
        function setupEvents() {
            const container = document.getElementById('questionsContainer');
            container.addEventListener('input', (e) => {
                if (e.target.classList.contains('question-text')) updateQuestionText(e.target.dataset.qid, e.target.value);
                if (e.target.classList.contains('choice-text')) updateChoiceText(e.target.dataset.qid, parseInt(e.target.dataset.choiceIdx), e.target.value);
            });
            container.addEventListener('change', (e) => {
                if (e.target.classList.contains('correct-radio')) updateCorrectAnswer(e.target.dataset.qid, e.target.dataset.choiceIdx);
            });
            container.addEventListener('click', (e) => {
                const del = e.target.closest('.delete-question');
                if (del) { deleteQuestion(del.dataset.qid); return; }
                const addChoice = e.target.closest('.add-choice');
                if (addChoice) { addChoiceToQuestion(addChoice.dataset.qid); return; }
                const remChoice = e.target.closest('.remove-choice');
                if (remChoice) { removeChoiceFromQuestion(remChoice.dataset.qid, parseInt(remChoice.dataset.choiceIdx)); return; }
            });
        }
        
        document.getElementById('addQuestionBtn')?.addEventListener('click', addNewQuestion);
        document.getElementById('fabAddBtn')?.addEventListener('click', addNewQuestion);
        document.getElementById('saveToGistBtn')?.addEventListener('click', saveQuestionsToGist);
        
        // تحميل أولي
        if (gistId) loadQuestionsFromGist();
        else questions = getDefaultQuestions();
        renderQuestions();
        setupEvents();
    </script>
</body>
</html>
